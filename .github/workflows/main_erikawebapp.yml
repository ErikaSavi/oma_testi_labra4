# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy container app to Azure Web App - erikawebapp

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to container registry
        uses: docker/login-action@v2
        with:
          registry: erikarn.azurecr.io/
          username: ${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_7F059BE05D884E6C87C81A29A5FE76B0 }}
          password: ${{ secrets.AZUREAPPSERVICE_CONTAINERPASSWORD_1AE03D6CEDCC4685951975444CC6A73A }}

      - name: Build and push container image to registry
        uses: docker/build-push-action@v3
        with:
          context: .
          push: true
          tags: erikarn.azurecr.io/${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_7F059BE05D884E6C87C81A29A5FE76B0 }}/erikabuild:${{ github.sha }}
          file: ./Dockerfile

  deploy:
    runs-on: ubuntu-latest
    
    needs: build
    
    steps:
      
      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'erikawebapp'
          slot-name: 'Production'
          images: 'erikarn.azurecr.io/${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_7F059BE05D884E6C87C81A29A5FE76B0 }}/erikabuild:${{ github.sha }}'
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_F7716EA4B76B4325B319C8D3D5776346 }}